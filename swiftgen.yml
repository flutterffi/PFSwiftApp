input_dir: Sources/PFSwiftApp/Resources
output_dir: ${DERIVED_SOURCES_DIR}

xcassets:
  inputs:
    - Assets.xcassets
  outputs:
    - templateName: swift5
      params:
        enumName: PFAsset
      output: PFAsset.swift

strings:
  inputs:
    - en.lproj/Localizable.strings
  outputs:
    - templateName: structured-swift5
      params:
        enumName: PFStrings
      output: PFStrings.swift
