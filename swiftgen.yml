input_dir: Sources/PFSwiftApp/Resources
output_dir: ${DERIVED_SOURCES_DIR}

xcassets:
  inputs:
    - Assets.xcassets
  outputs:
    - templatePath: SwiftGenTemplates/PFAssetsSwift6.stencil
      params:
        enumName: PFAsset
      output: PFAsset.swift

strings:
  inputs:
    - en.lproj/Localizable.strings
  outputs:
    - templateName: structured-swift5
      params:
        enumName: PFStrings
      output: PFStrings.swift

json:
  inputs:
    - Mock/PFDashboardSummary.json
    - Mock/PFTabItems.json
  outputs:
    - templatePath: SwiftGenTemplates/PFJSONSwift6.stencil
      params:
        enumName: PFJSON
      output: PFJSON.swift
